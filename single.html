<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0a0e17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>增肌助手 · 居家健身</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0e17;--bg2:#121826;--bg3:#1a2235;--text:#e8e8ec;--text2:#8892a4;--border:#2a3350;--accent:#ff6b6b;--green:#6bcb77;--blue:#4d96ff}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
body{overflow:hidden}

/* Layout */
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;position:relative}
.header{padding:16px 20px 12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.header h1{font-size:20px;font-weight:700;letter-spacing:1px}
.header h1 span{color:var(--accent);font-weight:400}
.views{flex:1;overflow-y:auto;padding-bottom:72px;-webkit-overflow-scrolling:touch}
.view{display:none;min-height:100%}
.view.active{display:block}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);margin:12px;border-radius:12px;overflow:hidden}
.section-h{font-size:14px;color:var(--text2);padding:16px 16px 8px;text-transform:uppercase;letter-spacing:1px}

/* Today card */
.today-card{padding:20px}
.today-tag{font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:2px;font-weight:600}
.today-name{font-size:24px;font-weight:700;margin:4px 0 4px}
.today-meta{font-size:13px;color:var(--text2);margin-bottom:16px}
.ex-cards{display:flex;flex-direction:column;gap:8px}
.ex-card{display:flex;align-items:center;padding:12px;background:var(--bg3);border-radius:8px;cursor:pointer;transition:opacity .15s}
.ex-card:active{opacity:.7}
.ex-num{width:28px;height:28px;border-radius:50%;border:2px solid var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--blue);flex-shrink:0;margin-right:10px}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-detail{font-size:12px;color:var(--text2);margin-top:2px}
.ex-arrow{color:var(--text2);font-size:18px}

/* Buttons */
.btn-start{display:block;width:calc(100% - 24px);margin:12px auto 0;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#ff6b6b,#ff922b);color:#fff;font-size:16px;font-weight:700;cursor:pointer}
.btn-start:active{opacity:.8}
.btn-done{display:block;width:calc(100% - 24px);margin:12px auto 0;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#6bcb77,#20c997);color:#fff;font-size:16px;font-weight:700;cursor:pointer}
.btn-done:active{opacity:.8}
.btn-finish{display:block;width:calc(100% - 24px);margin:8px auto 0;padding:12px;border:1px solid #ff4757;border-radius:10px;background:transparent;color:#ff4757;font-size:14px;cursor:pointer}
.btn-save{display:block;width:calc(100% - 24px);margin:12px auto;padding:14px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.btn-save:active{opacity:.8}
.btn-clear{display:block;width:calc(100% - 24px);margin:8px auto;padding:10px;border:1px solid #ff4757;border-radius:8px;background:transparent;color:#ff4757;font-size:13px;cursor:pointer}

/* Week preview */
.day-row{display:flex;align-items:center;padding:10px 16px;font-size:14px;border-top:1px solid var(--border)}
.day-row.day-today{background:var(--bg3)}
.day-label{width:50px;font-weight:600;color:var(--text2);font-size:13px}
.day-today .day-label{color:var(--accent)}
.day-row span:last-child{margin-left:auto;font-weight:600}
.today-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-left:8px;flex-shrink:0}

/* Workout */
.workout-header{display:flex;align-items:center;padding:0 16px;gap:8px;margin-top:8px}
.wp-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.wp-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.wp-text{font-size:12px;color:var(--text2);width:40px;text-align:right}

.ex-show{padding:20px;text-align:center}
.ex-show-top{display:flex;justify-content:center;align-items:center;gap:12px;margin-bottom:8px}
.mg-tag{font-size:12px;padding:3px 10px;border-radius:12px;font-weight:600}
.set-label{font-size:13px;color:var(--text2)}
.ex-show-name{font-size:20px;font-weight:700;margin:8px 0}
.ex-show-target{font-size:14px;color:var(--text2)}

.rep-area{padding:12px 20px}
.rep-ctr{display:flex;align-items:center;justify-content:center;gap:20px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.ctr-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ctr-btn:active{background:var(--border)}
#rep-val{font-size:36px;font-weight:700;min-width:60px;text-align:center}
.rep-lbl{font-size:11px;color:var(--text2);text-align:center;margin-top:4px}

.w-nav{display:flex;justify-content:space-between;padding:0 12px;margin-top:4px}
.btn-back,.btn-fwd{padding:10px 16px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer}
.btn-back:active,.btn-fwd:active{opacity:.7}

/* Rest timer overlay */
#rest-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,14,23,.92);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:999}
#rest-overlay span{font-size:72px;font-weight:700;color:var(--accent)}
#rest-overlay p{font-size:16px;color:var(--text2);margin-top:8px}
.skip-btn{margin-top:24px;padding:10px 32px;border:1px solid var(--text2);border-radius:8px;background:transparent;color:var(--text);cursor:pointer;font-size:14px}

/* Flash notification */
#rest-flash{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;opacity:0;transition:opacity .2s;z-index:998;pointer-events:none}
#rest-flash.flash{opacity:1}

/* Exercise library */
.search-wrap{padding:12px 16px}
.search-input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:14px;outline:none}
.search-input:focus{border-color:var(--accent)}
.filter-row{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;white-space:nowrap;cursor:pointer;flex-shrink:0}
.filter-active{color:#fff}
.ex-detail-card{margin:0 12px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer}
.ex-detail-card:active{opacity:.8}
.ex-d-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ex-d-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ex-d-name{font-size:15px;font-weight:600;flex:1}
.ex-d-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.knee-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:#6bcb7722;color:#6bcb77}
.ex-d-desc{font-size:13px;color:var(--text2);line-height:1.5}

/* Exercise detail */
#ex-detail-container{padding:12px}
.ex-back-btn{padding:10px 16px;font-size:14px;color:var(--text2);cursor:pointer}
.detail-block{margin-top:16px}
.detail-block h3{font-size:14px;font-weight:600;margin-bottom:8px}
.detail-block p,.detail-block li{font-size:14px;color:var(--text2);line-height:1.6}
.detail-block ul{padding-left:18px}
.err-li{color:#ff6b6b}
.prog-list{display:flex;flex-direction:column;gap:4px}
.prog-item{font-size:13px;color:var(--blue);padding:4px 0}

/* Mini chart */
.mini-chart{display:flex;align-items:flex-end;gap:4px;height:60px}
.m-bar{flex:1;border-radius:4px 4px 0 0;position:relative;min-width:0;display:flex;align-items:flex-start;justify-content:center;padding-top:2px}
.m-val{font-size:9px;color:#fff}

/* Stats */
.stats-row{display:flex;gap:8px;padding:12px 16px}
.stat-item{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 8px;text-align:center}
.stat-num{font-size:24px;font-weight:700;color:var(--accent)}
.stat-txt{font-size:11px;color:var(--text2);margin-top:4px}

/* Week chart */
.week-chart{display:flex;align-items:flex-end;gap:12px;padding:12px 16px 16px;height:140px}
.w-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.w-bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height .3s}
.w-bar-label{font-size:10px;color:var(--text2)}
.w-bar-val{font-size:11px;font-weight:600}

/* Recent list */
.recent-row{display:flex;align-items:center;padding:10px 16px;border-top:1px solid var(--border);font-size:13px;gap:8px}
.recent-row span:last-child{margin-left:auto;color:var(--text2)}

/* Settings */
.s-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border)}
.s-row label{font-size:14px}
.s-input{width:120px;padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;outline:none;text-align:right}
.s-input:focus{border-color:var(--accent)}
.s-toggle-row{display:flex;align-items:center;justify-content:space-between}
.s-help{font-size:12px;color:var(--text2);padding:0 16px 12px}

/* Toggle switch */
.ts{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}
.ts input{opacity:0;width:0;height:0}
.ts-sl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--bg3);border:1px solid var(--border);border-radius:12px;transition:.2s}
.ts-sl:before{content:"";position:absolute;height:18px;width:18px;left:2px;bottom:2px;background:#888;border-radius:50%;transition:.2s}
.ts input:checked+.ts-sl{background:var(--accent);border-color:var(--accent)}
.ts input:checked+.ts-sl:before{transform:translateX(20px);background:#fff}

/* Nutrition */
.nutri-grid{display:flex;gap:8px;padding:12px 16px}
.nutri-item{flex:1;background:var(--bg3);border-radius:8px;padding:12px;text-align:center}
.nutri-l{font-size:12px;color:var(--text2);display:block}
.nutri-v{font-size:18px;font-weight:700;color:var(--green);display:block;margin-top:2px}

/* Empty */
.empty-msg{padding:24px;text-align:center;color:var(--text2);font-size:14px}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);display:flex;background:var(--bg2);border-top:1px solid var(--border);max-width:480px;width:100%;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:10px;transition:color .15s}
.nav-item .n-icon{font-size:20px;margin-bottom:2px}
.nav-item.active{color:var(--accent)}
.nav-item.active .n-icon{font-size:22px}

/* ========================
   MODAL - Exercise Detail
   ======================== */
.modal-overlay {
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.85);
  z-index:200;
  justify-content:flex-end;
  animation:fadeIn .2s ease;
}
.modal-overlay.open {
  display:flex;
}
@keyframes fadeIn {
  from{opacity:0}to{opacity:1}
}
.modal-content {
  width:100%;max-width:480px;
  margin-left:auto;
  background:var(--bg);
  height:100vh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  animation:slideIn .3s ease;
}
@keyframes slideIn {
  from{transform:translateX(100%)}
  to{transform:translateX(0)}
}
.modal-close {
  position:sticky;top:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  z-index:10;
}
.modal-close-btn {
  background:none;border:none;color:var(--text2);
  font-size:24px;cursor:pointer;padding:4px 8px;
}
.modal-close-btn:active{color:var(--accent)}
.modal-title-bar {
  display:flex;align-items:center;gap:8px;flex:1;min-width:0;
}
.modal-ex-name {
  font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.modal-tags-row {
  display:flex;gap:6px;padding:10px 16px;background:var(--bg2);
}
.modal-hero {
  padding:20px 16px;text-align:center;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
}
.modal-svg-wrap {
  width:180px;height:180px;margin:0 auto 12px;
  border-radius:50%;
  background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--border);
  overflow:hidden;
}
.modal-svg-wrap svg {
  width:100%;height:100%;
}

/* Detail sections */
.detail-section {
  padding:16px;
  border-bottom:1px solid var(--border);
}
.detail-section:last-child {
  border-bottom:none;
}
.detail-section h3 {
  font-size:15px;font-weight:700;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.detail-section h3 .icon {
  font-size:16px;
}
.detail-section p {
  font-size:14px;color:var(--text2);line-height:1.6;
}

/* Step blocks */
.step-block {
  display:flex;gap:12px;padding:10px 0;
  border-bottom:1px solid var(--border);
}
.step-block:last-child { border-bottom:none; }
.step-num {
  width:26px;height:26px;border-radius:50%;
  background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;flex-shrink:0;
}
.step-text {
  font-size:14px;line-height:1.5;flex:1;
  padding-top:3px;
}

/* Tips list */
.tips-list {
  list-style:none;display:flex;flex-direction:column;gap:6px;
}
.tips-list li {
  font-size:13px;color:var(--green);
  padding:8px 12px;background:rgba(107,203,119,.08);
  border-radius:6px;border-left:3px solid var(--green);
}

/* Mistakes list */
.mistakes-list {
  list-style:none;display:flex;flex-direction:column;gap:6px;
}
.mistakes-list li {
  font-size:13px;color:var(--accent);
  padding:8px 12px;background:rgba(255,107,107,.08);
  border-radius:6px;border-left:3px solid var(--accent);
}

/* Muscle group cards */
.muscle-cards {
  display:flex;flex-wrap:wrap;gap:8px;
}
.muscle-card {
  flex:1 1 calc(50% - 4px);
  min-width:calc(50% - 4px);
  background:var(--bg3);
  border-radius:8px;
  padding:12px;
  text-align:center;
}
.muscle-name {
  font-size:13px;font-weight:600;
}
.muscle-type {
  font-size:11px;color:var(--text2);margin-top:2px;
}

/* Progression cards */
.prog-cards {
  display:flex;flex-direction:column;gap:8px;
}
.prog-card {
  display:flex;align-items:center;gap:10px;
  background:var(--bg3);
  border-radius:8px;
  padding:12px 14px;
}
.prog-arrow {
  font-size:16px;color:var(--accent);
}
.prog-text {
  font-size:14px;font-weight:500;
}

/* Breathing block */
.breathing-block {
  background:rgba(77,150,255,.08);
  border-radius:8px;
  padding:12px;
  border-left:3px solid var(--blue);
}
.breathing-text {
  font-size:14px;color:var(--text);
}

/* Target reps block */
.target-block {
  display:flex;gap:12px;
}
.target-item {
  flex:1;
  background:var(--bg3);
  border-radius:8px;
  padding:12px;
  text-align:center;
}
.target-label {
  font-size:11px;color:var(--text2);text-transform:uppercase;
}
.target-value {
  font-size:16px;font-weight:700;color:var(--accent);margin-top:4px;
}

</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>增肌<span>助手</span></h1>
  </div>
  <div class="views">
    <!-- PLAN VIEW -->
    <div id="view-plan" class="view active">
      <div id="plan-list"></div>
    </div>
    <!-- WORKOUT VIEW -->
    <div id="view-workout" class="view">
      <div id="workout-content"></div>
    </div>
    <!-- EXERCISE LIBRARY VIEW -->
    <div id="view-exercise" class="view">
      <div id="ex-list"></div>
      <!-- Exercise detail modal -->
  <div id="ex-modal" class="modal-overlay" onclick="if(event.target===this)closeExModal()">
    <div class="modal-content">
      <div class="modal-close">
        <div class="modal-title-bar">
          <span id="modal-ex-name" class="modal-ex-name"></span>
        </div>
        <button class="modal-close-btn" onclick="closeExModal()">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>
    </div>
    <!-- PROGRESS VIEW -->
    <div id="view-progress" class="view">
      <div id="progress-content"></div>
    </div>
    <!-- SETTINGS VIEW -->
    <div id="view-settings" class="view">
      <div id="settings-content"></div>
    </div>
  </div>

  <!-- Rest timer overlay -->
  <div id="rest-overlay">
    <span id="rt-num">60</span>
    <p>秒后继续</p>
    <button class="skip-btn" onclick="doSkipRest()">跳过休息</button>
  </div>

  <!-- Flash notification -->
  <div id="rest-flash">休息完成！继续训练</div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-plan" onclick="navigateTo('plan')">
      <span class="n-icon">📋</span>
      <span>计划</span>
    </button>
    <button class="nav-item" id="nav-workout" onclick="navigateTo('workout')" style="display:none">
      <span class="n-icon">🏋️</span>
      <span>训练中</span>
    </button>
    <button class="nav-item" id="nav-exercise" onclick="navigateTo('exercise')">
      <span class="n-icon">📖</span>
      <span>动作库</span>
    </button>
    <button class="nav-item" id="nav-progress" onclick="navigateTo('progress')">
      <span class="n-icon">📊</span>
      <span>进度</span>
    </button>
    <button class="nav-item" id="nav-settings" onclick="navigateTo('settings')">
      <span class="n-icon">⚙️</span>
      <span>设置</span>
    </button>
  </nav>
</div>

<script>

  "2": {
    "name": "宽距俯卧撑",

<script>
var DB = {
  _db: null,
  _open: function() {
    if (this._db) return Promise.resolve(this._db);
    return new Promise(function(ok, no) {
      var r = indexedDB.open("FitnessApp", 1);
      r.onerror = function() { no(r.error); };
      r.onsuccess = function() { DB._db = r.result; ok(DB._db); };
      r.onupgradeneeded = function(e) {
        var d = e.target.result;
        if (!d.objectStoreNames.contains("logs")) {
          var s = d.createObjectStore("logs", {keyPath:"id", autoIncrement:true});
          s.createIndex("date","date",{unique:false});
        }
        if (!d.objectStoreNames.contains("settings")) d.createObjectStore("settings",{keyPath:"key"});
        if (!d.objectStoreNames.contains("progress")) {
          var ps = d.createObjectStore("progress",{keyPath:"id"});
          ps.createIndex("exerciseId","exerciseId",{unique:false});
          ps.createIndex("date","date",{unique:false});
        }
      };
    });
  },
  saveLog: function(log) {
    return this._open().then(function(d) {
      return new Promise(function(ok, no) {
        var tx = d.transaction("logs","readwrite");
        var r = tx.objectStore("logs").add(log);
        r.onsuccess = function() { ok({id:r.result, ...log}); };
        r.onerror = function() { no(r.error); };
      });
    });
  },
  getLogs: function() {
    return this._open().then(function(d) {
      return new Promise(function(ok) {
        var tx = d.transaction("logs","readonly");
        var r = tx.objectStore("logs").getAll();
        r.onsuccess = function() {
          var arr = (r.result || []).sort(function(a,b) { return new Date(b.date) - new Date(a.date); });
          ok(arr);
        };
      });
    });
  },
  getSettings: function() {
    return this._open().then(function(d) {
      return new Promise(function(ok) {
        var tx = d.transaction("settings","readonly");
        var r = tx.objectStore("settings").getAll();
        r.onsuccess = function() {
          var o = {};
          (r.result || []).forEach(function(i) { o[i.key] = i.value; });
          ok(o);
        };
      });
    });
  },
  saveSettings: function(obj) {
    return this._open().then(function(d) {
      return new Promise(function(ok, no) {
        var tx = d.transaction("settings","readwrite");
        Object.keys(obj).forEach(function(k) { tx.objectStore("settings").put({key:k, value:obj[k]}); });
        tx.oncomplete = function() { ok(true); };
        tx.onerror = function() { no(tx.error); };
      });
    });
  },
  saveProgress: function(exId, date, reps, completed) {
    return this._open().then(function(d) {
      return new Promise(function(ok) {
        var tx = d.transaction("progress","readwrite");
        tx.objectStore("progress").add({
          id: exId + "_" + date + "_" + Date.now(),
          exerciseId: exId,
          date: date,
          reps: reps,
          completed: completed
        });
        tx.oncomplete = function() { ok(true); };
      });
    });
  },
  getHistory: function(exId, days) {
    return this._open().then(function(d) {
      return new Promise(function(ok) {
        var tx = d.transaction("progress","readonly");
        var idx = tx.objectStore("progress").index("exerciseId");
        var r = idx.getAll(exId);
        r.onsuccess = function() {
          var cutoff = new Date();
          cutoff.setDate(cutoff.getDate() - (days || 30));
          var arr = (r.result || []).filter(function(h) { return new Date(h.date) >= cutoff; })
            .sort(function(a,b) { return new Date(a.date) - new Date(b.date); });
          ok(arr);
        };
      });
    });
  },
  getStats: function() {
    return this.getLogs().then(function(logs) {
      var totalW = logs.length;
      var totalD = logs.reduce(function(s,l) { return s + (l.durationSeconds || 0); }, 0);
      var totalV = logs.reduce(function(s,l) { return s + (l.totalVolume || 0); }, 0);
      var weekly = {};
      var now = new Date();
      for (var i = 0; i < 12; i++) {
        var ws = new Date(now); ws.setDate(ws.getDate() - i*7);
        var we = new Date(ws); we.setDate(we.getDate() + 6);
        var key = ws.toISOString().split("T")[0];
        var cnt = logs.filter(function(l) { var d = new Date(l.date); return d >= ws && d <= we; }).length;
        weekly[key] = cnt;
      }
      return {totalWorkouts:totalW, totalDuration:totalD, totalVolume:totalV, weeklyData:weekly, recentLogs:logs.slice(0,7)};
    });
  }
};

</script>
<script>
// ====== STATE ======
var ST = {
  currentView: "plan",
  workout: null,
  curEx: 0,
  curSet: 0,
  restTimer: null,
  restLeft: 0,
  settings: {},
  filter: "all",
  workoutStart: null
};

// ====== HELPERS ======
function exData(id) { return DATA.EX.find(function(e){return e.id===id;}); }
function mgLabel(mg) { return DATA.LABELS[mg] || "综合"; }
function mgColor(mg) { return DATA.COLORS[mg] || "#4d96ff"; }
function dayRest(s) { if(s<=30) return "快休"; if(s<=45) return "中休"; return s+"秒"; }

// ====== NAVIGATION ======
function navigateTo(view) {
  ST.currentView = view;
  document.querySelectorAll(".view").forEach(function(v){v.classList.remove("active");});
  var t = document.getElementById("view-"+view);
  if(t) t.classList.add("active");
  document.querySelectorAll(".nav-item").forEach(function(i){i.classList.remove("active");});
  var n = document.getElementById("nav-"+view);
  if(n) n.classList.add("active");

  if(view==="plan") renderPlan();
  if(view==="exercise") renderExLibrary();
  if(view==="progress") renderProgress();
  if(view==="settings") renderSettings();
}

// ====== PLAN VIEW ======
function renderPlan() {
  var c = document.getElementById("plan-list");
  if(!c) return;
  var today = new Date().getDay();
  var plan = DATA.PLANS.find(function(p){return p.day===today;});
  if(!plan) plan = DATA.PLANS[0];
  var totalSets = 0;
  plan.ex.forEach(function(e){totalSets+=e.s;});

  var html = "";
  // Today header
  html += '<div class="card today-card">';
  html += '<div class="today-tag">今天 · ' + DATA.DAYS[today] + '</div>';
  html += '<h2 class="today-name">' + plan.name + '</h2>';
  html += '<div class="today-meta">' + totalSets + '组 · 约30分钟</div>';
  html += '<div class="ex-cards">';

  plan.ex.forEach(function(ex,i) {
    var ed = exData(ex.eid);
    var col = ed ? mgColor(ed.mg) : "#4d96ff";
    html += '<div class="ex-card" onclick="startWorkout(\''+plan.id+'\',0)">';
    html += '<div class="ex-num" style="border-color:'+col+'">'+(i+1)+'</div>';
    html += '<div class="ex-info">';
    html += '<div class="ex-name">'+ex.n+'</div>';
    html += '<div class="ex-detail">'+ex.s+'组 × '+ex.r+'次 · '+dayRest(ex.rest)+'</div>';
    html += '</div>';
    html += '<div class="ex-arrow">›</div>';
    html += '</div>';
  });

  html += '</div>';
  html += '<button class="btn-start" onclick="startWorkout(\''+plan.id+'\',0)">▶ 开始训练</button>';
  html += '</div>';

  // Week preview
  html += '<div class="card">';
  html += '<h3 class="section-h">本周计划</h3>';
  DATA.PLANS.forEach(function(p) {
    var isToday = p.day === today;
    html += '<div class="day-row' + (isToday?' day-today':'') + '">';
    html += '<span class="day-label">' + DATA.DAYS[p.day] + '</span>';
    html += '<span>' + p.name + '</span>';
    if(isToday) html += '<span class="today-dot"></span>';
    html += '</div>';
  });
  html += '</div>';

  c.innerHTML = html;
}

function startWorkout(planId, startIdx) {
  var plan = DATA.PLANS.find(function(p){return p.id===planId;});
  if(!plan) return;
  ST.workout = plan;
  ST.curEx = startIdx;
  ST.curSet = 0;
  ST.workoutStart = new Date().toISOString();
  clearRest();
  navigateTo("workout");
  renderWorkout();
}

// ====== WORKOUT VIEW ======
function renderWorkout() {
  var c = document.getElementById("workout-content");
  if(!c || !ST.workout) return;
  var plan = ST.workout;
  var exArr = plan.ex;
  var ex = exArr[ST.curEx];
  if(!ex) return;
  var ed = exData(ex.eid);
  var col = ed ? mgColor(ed.mg) : "#4d96ff";
  var pct = ((ST.curEx+1)/exArr.length*100).toFixed(0);

  var html = "";
  // Header
  html += '<div class="workout-header">';
  html += '<div class="wp-bar"><div class="wp-fill" style="width:'+pct+'%"></div></div>';
  html += '<span class="wp-text">'+(ST.curEx+1)+'/'+exArr.length+'</span>';
  html += '</div>';

  // Exercise card
  html += '<div class="ex-show card">';
  html += '<div class="ex-show-top">';
  html += '<span class="mg-tag" style="background:'+col+'22;color:'+col+'">'+mgLabel(ed?ed.mg:"core")+'</span>';
  html += '<span class="set-label">第 '+(ST.curSet+1)+'/'+ex.s+' 组</span>';
  html += '</div>';
  html += '<h2 class="ex-show-name">'+ex.n+'</h2>';
  html += '<div class="ex-show-target">'+ex.r+'次 · 休息'+ex.rest+'秒</div>';
  html += '</div>';

  // Rep counter
  html += '<div class="rep-area">';
  html += '<div class="rep-ctr">';
  html += '<button class="ctr-btn" onclick="adjRep(-1)">−</button>';
  html += '<span id="rep-val">'+ex.r+'</span>';
  html += '<button class="ctr-btn" onclick="adjRep(1)">+</button>';
  html += '<div class="rep-lbl">目标: '+ex.r+' 次</div>';
  html += '</div>';
  html += '</div>';

  // Buttons
  if(ST.curSet < ex.s - 1) {
    html += '<button class="btn-done" onclick="doCompleteSet()">✓ 完成这组</button>';
  } else {
    html += '<button class="btn-done" onclick="doCompleteEx()">✓ 完成动作</button>';
  }

  // Nav
  html += '<div class="w-nav">';
  if(ST.curEx > 0) html += '<button class="btn-back" onclick="doPrevEx()">← 上一个</button>';
  if(ST.curEx < exArr.length - 1) html += '<button class="btn-fwd" onclick="doNextEx()">下一个 →</button>';
  html += '</div>';

  html += '<button class="btn-finish" onclick="doFinish()">⏹ 结束训练</button>';

  c.innerHTML = html;
}

window.adjRep = function(d) {
  var el = document.getElementById("rep-val");
  if(!el) return;
  var v = parseInt(el.textContent)||0;
  el.textContent = Math.max(0, v+d);
};

window.doCompleteSet = function() {
  var ex = ST.workout.ex[ST.curEx];
  var ed = exData(ex.eid);
  var rv = parseInt(document.getElementById("rep-val")?.textContent || ex.r);
  var today = new Date().toISOString().split("T")[0];
  if(ed) DB.saveProgress(ed.id, today, rv, true);
  ST.curSet++;
  startRest(ex.rest);
  renderWorkout();
};

window.doCompleteEx = function() {
  var ex = ST.workout.ex[ST.curEx];
  var ed = exData(ex.eid);
  var rv = parseInt(document.getElementById("rep-val")?.textContent || ex.r);
  var today = new Date().toISOString().split("T")[0];
  if(ed) DB.saveProgress(ed.id, today, rv, true);
  doNextEx();
};

window.doPrevEx = function() {
  if(ST.curEx > 0) { ST.curEx--; ST.curSet = 0; renderWorkout(); }
};

window.doNextEx = function() {
  var exArr = ST.workout.ex;
  if(ST.curEx < exArr.length - 1) {
    ST.curEx++; ST.curSet = 0; clearRest(); renderWorkout();
  }
};

function startRest(sec) {
  clearRest();
  ST.restLeft = sec;
  showRestTimer(sec);
  ST.restTimer = setInterval(function() {
    ST.restLeft--;
    if(ST.restLeft <= 0) { clearRest(); onRestDone(); return; }
    var n = document.getElementById("rt-num");
    if(n) n.textContent = ST.restLeft;
  }, 1000);
}

function clearRest() {
  if(ST.restTimer) { clearInterval(ST.restTimer); ST.restTimer = null; }
}

function showRestTimer(sec) {
  var a = document.getElementById("rest-overlay");
  if(!a) return;
  a.style.display = "flex";
  a.querySelector("span").textContent = sec;
}

function onRestDone() {
  var a = document.getElementById("rest-overlay");
  if(a) { a.style.display = "none"; a.querySelector("span").textContent = ST.restLeft; }
  var flash = document.getElementById("rest-flash");
  if(flash) { flash.classList.add("flash"); setTimeout(function(){flash.classList.remove("flash");}, 2000); }
}

window.doSkipRest = function() {
  clearRest();
  var a = document.getElementById("rest-overlay");
  if(a) a.style.display = "none";
};

window.doFinish = function() {
  if(!confirm("确定结束本次训练？")) return;
  var st = new Date(ST.workoutStart);
  var now = new Date();
  var dur = Math.round((now-st)/1000);
  var vol = 0;
  ST.workout.ex.forEach(function(e){vol += e.s * e.r;});
  var log = {
    date: new Date().toISOString(),
    planId: ST.workout.id,
    planName: ST.workout.name,
    durationSeconds: dur,
    totalVolume: vol
  };
  DB.saveLog(log).then(function(){
    clearRest();
    ST.workout = null;
    navigateTo("progress");
  });
};

// ====== EXERCISE LIBRARY ======
function renderExLibrary() {
  var c = document.getElementById("ex-list");
  if(!c) return;
  var term = (document.getElementById("ex-search")?.value||"").toLowerCase();
  var grp = ST.filter || "all";

  var filtered = DATA.EX.filter(function(ex) {
    var ms = !term || ex.name.toLowerCase().includes(term);
    var mg = grp==="all" || ex.mg === grp;
    return ms && mg;
  });

  var html = "";
  // Search
  html += '<div class="search-wrap">';
  html += '<input type="text" id="ex-search" placeholder="🔍 搜索动作名称..." oninput="renderExLibrary()" class="search-input">';
  html += '</div>';

  // Filter buttons
  html += '<div class="filter-row">';
  html += '<button class="filter-btn'+(grp==="all"?" filter-active":"")+'" onclick="setFilter(\'all\')">全部</button>';
  Object.keys(DATA.LABELS).forEach(function(g) {
    var col = mgColor(g);
    var cls = grp===g ? "filter-active":"";
    html += '<button class="filter-btn '+cls+'" data-mg="'+g+'" style="'+(grp===g?'background:'+col+';color:#fff;border-color:'+col:'')+'" onclick="setFilter(\''+g+'\')">'+DATA.LABELS[g]+'</button>';
  });
  html += '</div>';

  // Ex cards
  if(filtered.length === 0) {
    html += '<div class="empty-msg">没有找到匹配的动作</div>';
  }
  filtered.forEach(function(ex) {
    var col = mgColor(ex.mg);
    html += '<div class="ex-detail-card" onclick="showExDetail('+ex.id+')">';
    html += '<div class="ex-d-header">';
    html += '<div class="ex-d-dot" style="background:'+col+'"></div>';
    html += '<div class="ex-d-name">'+ex.name+'</div>';
    html += '</div>';
    html += '<div class="ex-d-tags">';
    html += '<span class="tag" style="background:'+col+'22;color:'+col+'">'+mgLabel(ex.mg)+'</span>';
    html += '<span class="tag" style="background:'+col+'22;color:'+col+'">'+ex.diff+'</span>';

  });

  c.innerHTML = html;
}

  var mb = document.getElementById("modal-body");
  if(mb) mb.innerHTML = html;
  var modal = document.getElementById("ex-modal");
  if(modal) modal.classList.add("open");
  document.body.style.overflow = "hidden";

  DB.getHistory(id, 30).then(function(hist) {
    var ce = document.getElementById("ex-chart-"+id);
    if(!ce) return;
    if(hist.length === 0) { ce.innerHTML = '<div class="empty-msg">暂无记录</div>'; return; }
    ce.innerHTML = '<div class="mini-chart">';
    hist.slice(-7).forEach(function(h) {
      var h2 = Math.min(100, (h.reps/30)*100);
      ce.innerHTML += '<div class="m-bar" style="height:'+h2+'%;background:'+col+'"><span class="m-val">'+h.reps+'</span></div>';
    });
    ce.innerHTML += '</div>';
  });
};

// ====== PROGRESS VIEW ======
function renderProgress() {
  var c = document.getElementById("progress-content");
  if(!c) return;
  var html = "";
  html += '<div class="stats-row">';
  html += '<div class="stat-item"><div class="stat-num" id="s-total">0</div><div class="stat-txt">总训练次数</div></div>';
  html += '<div class="stat-item"><div class="stat-num" id="s-min">0</div><div class="stat-txt">总训练分钟</div></div>';
  html += '<div class="stat-item"><div class="stat-num" id="s-vol">0</div><div class="stat-txt">总容量</div></div>';
  html += '</div>';
  html += '<div class="card">';
  html += '<h3 class="section-h">近4周训练</h3>';
  html += '<div class="week-chart" id="week-chart"></div>';
  html += '</div>';
  html += '<div class="card">';
  html += '<h3 class="section-h">最近训练</h3>';
  html += '<div id="recent-list">加载中...</div>';
  html += '</div>';
  c.innerHTML = html;

  DB.getStats().then(function(s) {
    var te = document.getElementById("s-total");
    var me = document.getElementById("s-min");
    var ve = document.getElementById("s-vol");
    if(te) te.textContent = s.totalWorkouts;
    if(me) me.textContent = Math.round(s.totalDuration/60);
    if(ve) ve.textContent = s.totalVolume;

    var wc = document.getElementById("week-chart");
    if(wc) {
      var keys = Object.keys(s.weeklyData).reverse().slice(0,4);
      var max = Math.max(1, Math.max.apply(null, Object.values(s.weeklyData)));
      var maxH = wc.parentElement.clientHeight - 60;
      keys.forEach(function(k){
        var v = s.weeklyData[k]||0;
        var h = Math.max(4, (v/max)*maxH);
        var dk = k.substring(5);
        wc.innerHTML += '<div class="w-bar-wrap"><div class="w-bar" style="height:'+h+'px;background:linear-gradient(to top,#ff6b6b,#ff922b)"></div><div class="w-bar-label">'+dk+'</div><div class="w-bar-val">'+v+'</div></div>';
      });
    }

    var rl = document.getElementById("recent-list");
    if(rl) {
      if(!s.recentLogs.length) { rl.innerHTML='<div class="empty-msg">还没有训练记录</div>'; return; }
      var lh = "";
      s.recentLogs.forEach(function(l){
        var d = new Date(l.date);
        var ds = (d.getMonth()+1)+"/"+d.getDate() + " · " + DATA.DAYS[d.getDay()];
        var m = Math.round((l.durationSeconds||0)/60);
        lh += '<div class="recent-row"><span>'+ds+'</span><span>'+l.planName+'</span><span>'+m+'min</span></div>';
      });
      rl.innerHTML = lh;
    }
  });
}

// ====== SETTINGS VIEW ======
function renderSettings() {
  var c = document.getElementById("settings-content");
  if(!c) return;
  html = "";

  html += '<div class="card">';
  html += '<h3 class="section-h">个人信息</h3>';
  html += '<div class="s-row"><label>体重 (kg)</label><input type="number" id="s-weight" value="70" class="s-input"></div>';
  html += '<div class="s-row"><label>身高 (cm)</label><input type="number" id="s-height" value="170" class="s-input"></div>';
  html += '<div class="s-row"><label>年龄</label><input type="number" id="s-age" value="25" class="s-input"></div>';
  html += '</div>';

  html += '<div class="card">';
  html += '<h3 class="section-h">训练设置</h3>';
  html += '<div class="s-row"><label>组间休息 (秒)</label><input type="number" id="s-rest" value="60" class="s-input"></div>';
  html += '<div class="s-row"><label>难度级别</label><select id="s-diff" class="s-input"><option>初级</option><option selected>中级</option><option>进阶</option></select></div>';
  html += '</div>';

  html += '<div class="card">';
  html += '<h3 class="section-h">膝盖保护</h3>';
  html += '<div class="s-row s-toggle-row"><label>膝盖保护模式</label><label class="ts"><input type="checkbox" id="s-knee" checked><span class="ts-sl"></span></label></div>';
  html += '<p class="s-help">开启后将只显示膝盖友好的动作</p>';
  html += '</div>';

  html += '<div class="card">';
  html += '<h3 class="section-h">营养参考</h3>';
  html += '<div class="nutri-grid">';
  html += '<div class="nutri-item"><span class="nutri-l">每日热量</span><span class="nutri-v">—</span></div>';
  html += '<div class="nutri-item"><span class="nutri-l">蛋白质</span><span class="nutri-v">—</span></div>';
  html += '</div>';
  html += '</div>';

  html += '<button class="btn-save" onclick="saveSettings()">💾 保存设置</button>';
  html += '<div class="card" style="margin-top:16px">';
  html += '<h3 class="section-h">数据管理</h3>';
  html += '<button class="btn-clear" onclick="clearData()">清除所有数据</button>';
  html += '</div>';

  c.innerHTML = html;

  // Load saved settings
  DB.getSettings().then(function(saved) {
    if(saved.weight) document.getElementById("s-weight").value = saved.weight;
    if(saved.height) document.getElementById("s-height").value = saved.height;
    if(saved.age) document.getElementById("s-age").value = saved.age;
    if(saved.restSeconds) document.getElementById("s-rest").value = saved.restSeconds;
    if(saved.diff) document.getElementById("s-diff").value = saved.diff;
    if(saved.knee !== undefined) document.getElementById("s-knee").checked = saved.knee;

    // Update nutrition info
    var w = saved.weight || 70;
    var protein = Math.round(w * 1.8);
    var cal = Math.round(w * 35 + 400);
    var ni = c.querySelector(".nutri-grid");
    if(ni) {
      ni.innerHTML = '<div class="nutri-item"><span class="nutri-l">每日热量</span><span class="nutri-v">'+cal+' 大卡</span></div><div class="nutri-item"><span class="nutri-l">蛋白质</span><span class="nutri-v">'+protein+' g</span></div>';
    }
  });
}

window.saveSettings = function() {
  var obj = {
    weight: parseInt(document.getElementById("s-weight")?.value)||70,
    height: parseInt(document.getElementById("s-height")?.value)||170,
    age: parseInt(document.getElementById("s-age")?.value)||25,
    restSeconds: parseInt(document.getElementById("s-rest")?.value)||60,
    diff: document.getElementById("s-diff")?.value || "中级",
    knee: document.getElementById("s-knee")?.checked !== false
  };
  DB.saveSettings(obj).then(function(){
    alert("✅ 设置已保存！");
  });
};

window.clearData = function() {
  if(!confirm("确定清除所有数据？此操作不可恢复！")) return;
  if(!confirm("再次确认：清除所有训练记录和设置？")) return;
  var req = indexedDB.deleteDatabase("FitnessApp");
  req.onsuccess = function() { location.reload(); };
};

// ====== INIT ======
function init() {
  ST.filter = "all";
  DB.getSettings().then(function(saved) {
    Object.keys(saved).forEach(function(k){ ST.settings[k]=saved[k]; });
    navigateTo("plan");
  }).catch(function(){ navigateTo("plan"); });
}

</script>
<script>init();</script>
