<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2235"/>
      <stop offset="100%" style="stop-color:#0a0e17"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ff922b"/>
    </linearGradient>
  </defs>
  <!-- 圆角矩形背景 -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)" stroke="#2a3350" stroke-width="4"/>
  <!-- 哑铃图标 -->
  <g transform="translate(256,240)" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round">
    <!-- 横杆 -->
    <line x1="-100" y1="0" x2="100" y2="0"/>
    <!-- 左重片 -->
    <rect x="-130" y="-40" width="36" height="80" rx="8" fill="url(#accent)" stroke="none"/>
    <rect x="-110" y="-30" width="20" height="60" rx="4" fill="#ff922b" stroke="none"/>
    <!-- 右重片 -->
    <rect x="94" y="-40" width="36" height="80" rx="8" fill="url(#accent)" stroke="none"/>
    <rect x="90" y="-30" width="20" height="60" rx="4" fill="#ff922b" stroke="none"/>
  </g>
  <!-- 底部文字 -->
  <text x="256" y="420" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="48" font-weight="700" fill="#e8e8ec">增肌助手</text>
</svg>
